server:
  port: 8072

eureka:
  instance:
    preferIpAddress: true # Use IP address instead of hostname for service registration
  client: # Eureka Client configuration for the Gateway Server
    registerWithEureka: true # Register this Gateway Server with the Eureka Server
    fetchRegistry: true # Fetch the registry from the Eureka Server to discover other services
    serviceUrl: # URLs of Eureka Servers to connect to
      defaultZone: "http://localhost:8070/eureka/" # URL of the Eureka Server (adjust if Eureka Server is running on a different host or port)
